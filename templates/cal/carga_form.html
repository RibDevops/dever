{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">{% if form.instance.pk %}Editar{% else %}Nova{% endif %} Carga Horária</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                    <div class="text-danger small">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Salvar</button>
                    <a href="{% url 'cal:carga_list' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
