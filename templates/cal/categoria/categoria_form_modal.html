<!-- templates/cal/categoria/categoria_form_modal.html -->
<div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
        <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">
                <i class="fas fa-briefcase-medical me-2"></i>{{ title }}
            </h5>
            <button type="button" class="btn-close btn-close-white" 
                    data-bs-dismiss="modal"></button>
        </div>
        <form method="post" id="categoriaForm" 
              action="{% if categoria %}{% url 'cal:categoria_update' categoria.id %}{% else %}{% url 'cal:categoria_create' %}{% endif %}">
            {% csrf_token %}
            <div class="modal-body">
                <div class="mb-3">
                    <label for="{{ form.nome.id_for_label }}" class="form-label">
                        {{ form.nome.label }} *
                    </label>
                    {{ form.nome }}
                    <div class="invalid-feedback" id="nome-error"></div>
                </div>

                <div class="mb-3">
                    <label for="{{ form.descricao.id_for_label }}" class="form-label">
                        {{ form.descricao.label }}
                    </label>
                    {{ form.descricao }}
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> {{ submit_text }}
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('categoriaForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const form = this;
    const formData = new FormData(form);

    fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Fechar modal e recarregar a página
            const modal = bootstrap.Modal.getInstance(document.querySelector('.modal'));
            modal.hide();

            // Recarregar ou atualizar a lista
            location.reload();
        } else {
            // Exibir erros de validação
            if (data.errors) {
                for (const [field, errors] of Object.entries(data.errors)) {
                    const input = document.getElementById(`id_${field}`);
                    const errorDiv = document.getElementById(`${field}-error`);

                    if (input && errorDiv) {
                        input.classList.add('is-invalid');
                        errorDiv.textContent = errors[0];
                    }
                }
            }
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Ocorreu um erro ao salvar. Tente novamente.');
    });
});
</script>
