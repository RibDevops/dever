{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h4>{% if object %}Editar{% else %}Novo{% endif %} Turno</h4>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="{% url 'cal:tipoturno_list' %}" class="btn btn-secondary">Voltar</a>
  </form>
</div>
{% endblock %}
