{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h4>Excluir Turno</h4>
  <p>Deseja realmente excluir "{{ object }}"?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Confirmar</button>
    <a href="{% url 'cal:tipoturno_list' %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
